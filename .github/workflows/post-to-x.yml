name: Post new blog to X

on:
  push:
    branches: [master]
    paths:
      - 'src/content/blog/**/*.md'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Blog post slug to tweet (e.g. boromir-syndrome)'
        required: true

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find blog posts
        id: find-posts
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — find posts by slug
            SLUG="${{ github.event.inputs.slug }}"
            find src/content/blog -name "${SLUG}.md" | while read f; do echo "$f"; done > /tmp/posts.txt
            NEW_FILES=$(cat /tmp/posts.txt)
          else
            # Push trigger — only newly added files
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/blog/**/*.md' || true)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to X
        if: steps.find-posts.outputs.files != ''
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          FILES: ${{ steps.find-posts.outputs.files }}
        run: |
          pip install tweepy pyyaml

          python3 << 'PYEOF'
          import tweepy, yaml, re, os, sys, time

          api_key = os.environ.get("X_API_KEY", "")
          if not api_key:
              print("X credentials not configured yet — skipping")
              sys.exit(0)

          client = tweepy.Client(
              consumer_key=api_key,
              consumer_secret=os.environ["X_API_SECRET"],
              access_token=os.environ["X_ACCESS_TOKEN"],
              access_token_secret=os.environ["X_ACCESS_SECRET"],
          )

          files = os.environ.get("FILES", "").strip().splitlines()
          if not files or files == ['']:
              print("No files to post")
              sys.exit(0)

          site = "https://pharuslee.com"

          def post_with_retry(text, retries=3):
              for attempt in range(retries):
                  try:
                      client.create_tweet(text=text)
                      return True
                  except tweepy.errors.TwitterServerError as e:
                      wait = 10 * (attempt + 1)
                      print(f"  Server error ({e}), retrying in {wait}s...")
                      time.sleep(wait)
              print(f"  Failed after {retries} retries")
              return False

          for f in sorted(files):
              if not f.strip():
                  continue
              with open(f, "r", encoding="utf-8") as fh:
                  content = fh.read()

              match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
              if not match:
                  continue
              meta = yaml.safe_load(match.group(1))

              lang = meta.get("lang", "")
              slug = meta.get("urlSlug", "")
              title = meta.get("title", "")

              if not slug or not title:
                  continue

              url = f"{site}/{lang}/blog/{slug}/"
              tweet = f"{title}\n\n{url}"

              print(f"Posting: {tweet[:80]}...")
              if post_with_retry(tweet):
                  print(f"Posted {lang} tweet for: {title}")
              time.sleep(2)

          PYEOF
